name: 'Check for drive-by contributions'

permissions: {}

on:
  pull_request_target:
    types: [opened, ready_for_review, edited]

concurrency:
  group: driveby-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-description:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      pull-requests: write # create review
      issues: write # add/remove label
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: run } = await import('${{ github.workspace }}/.github/scripts/driveby-check.mjs')
            await run({ github, context })
